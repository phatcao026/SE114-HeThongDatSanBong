services:
  postgres:
    image: postgres:16
    container_name: se114-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: se114_db
      POSTGRES_USER: se114_user
      POSTGRES_PASSWORD: se114_password
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: